name: Build Releases

on:
  push:
    tags:
      - "v*"          # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual runs from the Actions tab

jobs:
  # ─────────────────────────────────────────────────────────────
  # Linux AppImage
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Tkinter + FUSE for AppImage)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-tk fuse libfuse2

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary with PyInstaller
        run: python -m PyInstaller localtorrent.spec --clean --noconfirm

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O packaging/appimagetool-x86_64.AppImage
          chmod +x packaging/appimagetool-x86_64.AppImage

      - name: Assemble AppDir
        run: |
          cp dist/localtorrent packaging/AppDir/localtorrent
          chmod +x packaging/AppDir/localtorrent packaging/AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 packaging/appimagetool-x86_64.AppImage \
            packaging/AppDir dist/LocalTorrent-x86_64.AppImage
          chmod +x dist/LocalTorrent-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalTorrent-Linux-AppImage
          path: dist/LocalTorrent-x86_64.AppImage

  # ─────────────────────────────────────────────────────────────
  # Windows EXE
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller localtorrent.spec --clean --noconfirm

      - name: Rename EXE
        run: mv dist/localtorrent.exe dist/LocalTorrent-Windows.exe
        shell: bash

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalTorrent-Windows-EXE
          path: dist/LocalTorrent-Windows.exe

  # ─────────────────────────────────────────────────────────────
  # GitHub Release — attach both artifacts
  # (only runs on tag pushes)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: LocalTorrent-Linux-AppImage
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LocalTorrent-Windows-EXE
          path: release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
